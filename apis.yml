aid: paradox-ai
name: Paradox
url: https://raw.githubusercontent.com/api-evangelist/paradox-ai/refs/heads/main/apis.yml
description: >-
  Paradox builds Olivia, a conversational AI assistant for high-volume hiring.
  The platform is delivered as a suite of "Conversational" products - ATS, CRM,
  Career Sites, Apply, Scheduling, and Events - and ships pre-built integrations
  for Workday, SAP SuccessFactors, and Indeed plus an Open API for custom
  partner integrations with systems like iCIMS, Greenhouse, and others.
  Paradox is sales-led; APIs are made available to enterprise customers and
  certified partners under contract rather than via a public self-serve
  developer portal.
kind: company
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
